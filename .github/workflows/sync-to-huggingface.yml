name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main
    paths:
      - "app.py"
      - "wm_tippspiel/**"
      - "templates/**"
      - "static/**"
      - "requirements.txt"
      - "Dockerfile"
      - "README.md"
  workflow_dispatch:

jobs:
  sync-to-huggingface:
    runs-on: ubuntu-latest

    steps:
      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: thebestian
          HF_SPACE_NAME: wm-tippspiel-2026
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          for i in 1 2 3; do
            echo "Push attempt $i..."
            if git push --force https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME main; then
              echo "Push successful."
              exit 0
            fi

            if [ "$i" -lt 3 ]; then
              wait_seconds=$((i * 600))
              echo "Push failed. Waiting $wait_seconds seconds before retry..."
              sleep $wait_seconds
            fi
          done

          echo "Push failed after 3 attempts."
          exit 1
